<main class="page">
  <section class="card">
    <h1>User Certificate Generator</h1>
    <p class="subtitle">Build a certificate using Angular Reactive Forms.</p>

    <form [formGroup]="certificateForm" (ngSubmit)="generateCertificate()" class="form-grid">
      <label>
        Full Name
        <input type="text" formControlName="fullName" placeholder="Enter user full name" />
        @if (fullName.touched && fullName.invalid) {
          <small>Name is required (minimum 3 characters).</small>
        }
      </label>

      <label>
        Course / Achievement
        <input type="text" formControlName="courseName" placeholder="Example: Angular Reactive Forms" />
        @if (courseName.touched && courseName.invalid) {
          <small>Course or achievement is required.</small>
        }
      </label>

      <label>
        Issue Date
        <input type="date" formControlName="issueDate" />
        @if (issueDate.touched && issueDate.invalid) {
          <small>Issue date is required.</small>
        }
      </label>

      <label>
        Issuer Name
        <input type="text" formControlName="issuerName" placeholder="Organization or trainer name" />
        @if (issuerName.touched && issuerName.invalid) {
          <small>Issuer name is required.</small>
        }
      </label>

      <button type="submit">Generate Certificate</button>
    </form>
  </section>

  @if (submitted && certificateForm.valid) {
    <section class="certificate">
      <p class="heading">Certificate of Completion</p>
      <h2>{{ fullName.value }}</h2>
      <p>has successfully completed</p>
      <h3>{{ courseName.value }}</h3>

      <div class="meta">
        <p><strong>Date:</strong> {{ issueDate.value }}</p>
        <p><strong>Issued by:</strong> {{ issuerName.value }}</p>
      </div>
    </section>
  }
</main>
